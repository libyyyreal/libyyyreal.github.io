<!doctype html>
<html lang="en-us">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="description" content="WebDOOM is a responsive web-based port of the classic DOOM game by id Software" />
  <meta name="keywords" content="DOOM, Doom, first-person shooter, id Software, classic game, action, weapons, levels" />
  <meta name="author" content="Neil Rackett" />
  <title>WebDOOM by Neil Rackett</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-width: 320px;
      min-height: 200px;
      background: #000;
      overflow: hidden;
    }

    #viewport {
      width: 100%;
      height: 100%;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      outline: none;
    }
  </style>
</head>

<body>
  <div id="viewport">
    <canvas id="canvas" width="1" height="1" tabindex="-1"></canvas>
  </div>
  <script>
    const canvas = document.getElementById("canvas");

    var Module = {
      print: function (text) {
        if (arguments.length > 1) {
          text = Array.from(arguments).slice(1).join(" ");
        }
        console.log(text);
      },

      printErr: function (text) {
        if (arguments.length > 1) {
          text = Array.from(arguments).slice(1).join(" ");
        }
        console.error(text);
      },

      canvas: (function () {
        canvas.addEventListener("contextmenu", (event) => {
          event.preventDefault();
        });
        canvas.addEventListener("webglcontextlost", (event) => {
          event.preventDefault();
          alert("WebGL context lost. Reload the page.");
        }, false);
        return canvas;
      })(),

      doomPixelRatio: 2,
    };

    canvas.addEventListener("dblclick", (event) => {
      document.fullscreenElement
        ? document.exitFullscreen()
        : canvas.requestFullscreen();
    });
  </script>
  <script async type="text/javascript" src="doom.js"></script>
